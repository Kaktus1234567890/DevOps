version: "3.9"

services:
  backend:
    image: ghcr.io/kaktus1234567890/devops:test
    container_name: backend
    expose:
      - "5000"

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend